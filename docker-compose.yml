version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: src/DayforceLite.API/Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DayforceDb=Server=db;Database=DayforceLite;User=sa;Password=YourPass123!;TrustServerCertificate=true
      - ElasticSearch__Uri=http://elasticsearch:9200
      - Jwt__Key=DayforceLiteSecretKey12345678901234567890
      - Jwt__Issuer=DayforceLite
      - Jwt__Audience=DayforceLite
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - dayforcelite-network

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourPass123!"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPass123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    networks:
      - dayforcelite-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - dayforcelite-network

volumes:
  sqldata:
  esdata:

networks:
  dayforcelite-network:
    driver: bridge
